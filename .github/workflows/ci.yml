name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Third-party actions pinned to full commit SHAs (supply-chain hardening).
      - name: Install stable toolchain
        # dtolnay/rust-toolchain@master — pinned SHA drops the ref that selects
        # the toolchain, so name it explicitly via the `toolchain` input.
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
          components: rustfmt, clippy

      # Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      # Unused-dependency audit. rust-cache caches ~/.cargo/bin, so the install
      # is paid once per cache generation.
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Unused dependencies
        run: cargo machete
