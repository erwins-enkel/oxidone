# oxidone configuration. `make config` copies this to your platform config dir
# (~/.config/oxidone/config.toml on Linux) if none exists; it never overwrites.

# Absolute path to your downloaded OAuth client (step 4 of the README).
# Must be absolute — `~` is NOT expanded (see issue #67). Uncomment and edit:
# client_secret_path = "/absolute/path/to/client_secret.json"

# Catppuccin flavor: "latte" | "frappe" | "macchiato" | "mocha"
theme = "mocha"

# Render ASCII block bars instead of braille, for terminals/fonts without
# braille glyphs.
ascii_fallback = false

# Hide entries due far in the future from the task pane. `w` toggles this live;
# this sets the state at startup. Entries due more than `horizon_days` days out
# are hidden while it is on; undated entries always stay.
hide_distant = false

# Horizon for `hide_distant`, in days. Entries due strictly more than this many
# days from today are the ones hidden.
horizon_days = 14
